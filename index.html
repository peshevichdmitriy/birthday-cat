<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Котик</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
          margin: 0;
          min-height: 100vh;
          overflow: hidden;
          background: #ffd6e7;

          display: flex;
          justify-content: center;
          align-items: center;
        }

        .scene {
          text-align: center;
        }
    </style>
</head>

<body>

<div class="scene">
        <div class="cat"></div>

        <div class="dialog">
        <p id="text">🐱 Сегодня очень важный день... Нужно подготовить подарок! 🎁</p>

        <button id="nextBtn">Начать</button>
        </div>

        <div id="items" class="items" style="display:none;">
            <span class="item wrong">⭐</span>
            <span class="item wrong">🐟</span>
            <span class="item" id="bow">🎀</span>
            <span class="item wrong">🧶</span>
            <span class="item wrong">🌸</span>
        </div>

        <div id="game" style="display:none;">
            <p id="score">Собрано: 0/5 ❤️</p>
        </div>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
    const text = document.getElementById("text");
    const btn = document.getElementById("nextBtn");
    const items = document.getElementById("items");
    const game = document.getElementById("game");
    const music = document.getElementById("bgMusic");
    let sceneActive = true;
    let typingActive = true;

btn.addEventListener("click", startGame);

function stopScene() {
    sceneActive = false;
}

// ==========================
// Волшебные частицы
// ==========================

const particles = ["⭐", "🌸", "❤️"];

function createParticle(){

    const particle = document.createElement("div");

    particle.className = "particle";

    particle.textContent =
        particles[Math.floor(Math.random() * particles.length)];

    particle.style.left =
        Math.random() * window.innerWidth + "px";

    particle.style.top =
        window.innerHeight + 40 + "px";

    particle.style.setProperty(
        "--drift",
        (Math.random() * 160 - 80) + "px"
    );

    particle.style.animationDuration =
        (7 + Math.random() * 5) + "s";

    particle.style.fontSize =
        (18 + Math.random() * 18) + "px";

    document.body.appendChild(particle);

    particle.addEventListener("animationend", () => {

        particle.remove();

    });

}

function startGame() {

    sceneActive = true;
    typingActive = true;

    music.volume = 0.3;   // громкость 30%
    music.play();

    btn.style.display = "none";

    text.textContent =
    "Для классного подарка нужно немного магии. Найди волшебную звездочку! ⭐";

    showBowGame();
    setInterval(createParticle, 1200);
}
// ==========================
// Игра с бантиком
// ==========================

function showBowGame() {

    items.style.display = "flex";

    items.innerHTML = `
        <span class="item wrong">🐟</span>
        <span class="item wrong">🧶</span>
        <span class="item" id="star">⭐</span>
        <span class="item wrong">🌸</span>
        <span class="item wrong">🍀</span>
    `;

    document.getElementById("star").addEventListener("click", () => {

        text.textContent =
            "⭐ Волшебная звездочка найдена! Теперь можно украсить этот день прекрасным цветком. 🌸";

        showFlowerGame();

    });

    addWrongItemListeners();
}

// ==========================
// Игра с цветком
// ==========================

function showFlowerGame() {

    items.innerHTML = `
        <span class="item wrong">⭐</span>
        <span class="item wrong">🐟</span>
        <span class="item wrong">🧶</span>
        <span class="item wrong">❤️</span>
        <span class="item" id="flower">🌸</span>
    `;

    document.getElementById("flower").addEventListener("click", () => {

        items.style.display = "none";

        text.textContent =
            "🌸 Отлично! Теперь поймай 5 сердечек, чтобы тебя окружила любовь!";

        startHeartGame();

    });

    addWrongItemListeners();
}

// ==========================
// Неправильные предметы
// ==========================

function addWrongItemListeners() {

    const wrongItems = document.querySelectorAll(".wrong");

    wrongItems.forEach(item => {

        item.addEventListener("click", () => {

            text.textContent =
                "🐱 Нет-нет! Сейчас нужен другой предмет.";

            item.style.opacity = "0.4";

        });

    });

}

// ==========================
// Сердечки
// ==========================

function startHeartGame() {

    game.style.display = "block";

    game.innerHTML = `
        <p id="score">Собрано: 0/5 ❤️</p>
    `;

    const score = document.getElementById("score");

    let count = 0;

    function createHeart() {

        const heart = document.createElement("span");

        heart.style.width = "60px";
        heart.style.height = "60px";
        heart.style.display = "flex";
        heart.style.alignItems = "center";
        heart.style.justifyContent = "center";

        heart.className = "heart";
        heart.textContent = "❤️";

        const size = game.clientWidth - 40;
        const height = game.clientHeight - 40;

        let x = Math.random() * size;
        let y = Math.random() * height;

        let dx = (Math.random() * 1.5 + 0.5) * (Math.random() > 0.5 ? 1 : -1);
        let dy = (Math.random() * 1.5 + 0.5) * (Math.random() > 0.5 ? 1 : -1);

        heart.style.left = x + "px";
        heart.style.top = y + "px";

        game.appendChild(heart);

        let removed = false;

        function move() {

            if (removed) return;

            x += dx;
            y += dy;

            if (x <= 0 || x >= size) dx *= -1;
            if (y <= 0 || y >= height) dy *= -1;

            heart.style.left = x + "px";
            heart.style.top = y + "px";

            requestAnimationFrame(move);
    }

            requestAnimationFrame(move);

                heart.addEventListener("click", () => {

                removed = true;
                heart.remove();

                count++;

                score.textContent = `Собрано: ${count}/5 ❤️`;

                    if (count >= 5) {
                        showGift();
                    } else {
                        createHeart();
            }

    });

}

    for (let i = 0; i < 5; i++) {
        createHeart();
    }

}

// ==========================
// Подарок
// ==========================

function showGift() {
    console.log("SHOW GIFT START");

    // Скрываем всё кроме кота
    text.style.display = "none";
    game.style.display = "none";
    items.style.display = "none";

    // Находим кота
    const cat = document.querySelector(".cat");

    // Через 10 секунд показываем продолжение
    setTimeout(() => {

        text.style.display = "block";
        game.style.display = "block";

        text.textContent =
            "🐱 Прости, засмотрелся на тебя такую красивую... Теперь можешь открывать подарок 💖";

        game.innerHTML = `
            <div id="gift" style="font-size:90px; cursor:pointer;">
                🎁
            </div>
        `;

        document.getElementById("gift").addEventListener("click", () => {

    game.innerHTML = `
        <div id="finalMessage" style="
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            min-height:300px;
            text-align:center;
            padding:20px;
        ">
            <p id="message" style="
                font-size:28px;
                line-height:1.6;
            "></p>
        </div>
    `;

    const message = document.getElementById("message");

    const messages = [
        { text: "💖 С Днём Рождения! 💖", delay: 2500 },

        { text: "Знаешь...", delay: 2200 },

        { text: "Все эти звёздочки ⭐", delay: 1800 },

        { text: "цветочки 🌸", delay: 1800 },

        { text: "сердечки ❤️", delay: 1800 },

        { text: "и даже этот подарок 🎁", delay: 2500 },

        { text: "На самом деле нужны были только для одного...", delay: 3000 },

        { text: "Чтобы увидеть твою улыбку.", delay: 4000 },

        {
            text: "Потому что она стоит намного больше,<br>чем всё, что поместилось в эту коробку.",
            delay: 5000
        },

        { text: "💖 С Днём Рождения, красавица. 💖", delay: 4000 }
    ];

    let index = 0;

    function showMessage() {

    if (!typingActive) return;

    // Сразу убираем старый текст
    message.innerHTML = "";

    // Небольшая пауза перед следующим сообщением
    setTimeout(() => {

        if (!typingActive) return;

        // Показываем новый текст
        message.innerHTML = messages[index].text;

        // Ждём указанное время
        setTimeout(() => {

            if (!typingActive) return;

            index++;

            if (index < messages.length) {

                showMessage();

            } else {

                typingActive = false;

                // Плавно скрываем старую сцену
                const scene = document.querySelector(".scene");

                scene.classList.add("fade-out");

                setTimeout(() => {

                    scene.innerHTML = `
                        <div class="final-screen">
                            <div class="polaroid">
                                <img src="photo.jpg" alt="Фото">

                                <div class="polaroid-date">
                                    01.07.2026 ❤️
                                </div>
                            </div>

                            <div id="letterBtn" class="letter-button">
                                ✉️ Открыть письмо
                            </div>
                        </div>
                    `;

                    scene.classList.remove("fade-out");

                }, 800);

            }

        }, messages[index].delay);

    }, 300);
}

    showMessage();

});

    }, 5000); // 10 секунд
}
</script>



</body>
</html>
